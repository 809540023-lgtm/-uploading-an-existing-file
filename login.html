<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會員登入 · 屬於大家的數位金融新世代</title>
<style>
  :root{--bg:#05060f;--cyan:#22e3ff;--violet:#a259ff;--pink:#ff4fd8;--green:#3dffab;
        --txt:#e9f0ff;--muted:#8893b8;--line:rgba(120,150,255,.18);--panel:rgba(255,255,255,.04)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px;
    background:radial-gradient(900px 600px at 80% -10%,rgba(162,89,255,.25),transparent 60%),
               radial-gradient(700px 500px at 10% 30%,rgba(34,227,255,.16),transparent 55%),var(--bg);
    color:var(--txt);font-family:-apple-system,"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif}
  a{color:var(--cyan);text-decoration:none}
  .grad{background:linear-gradient(90deg,var(--cyan),var(--violet),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent}
  .box{width:100%;max-width:440px;border:1px solid var(--line);border-radius:24px;padding:34px;
    background:rgba(10,14,36,.7);backdrop-filter:blur(16px);box-shadow:0 24px 80px rgba(0,0,0,.5)}
  .back{font-size:13px;color:var(--muted);display:inline-block;margin-bottom:18px}
  h1{font-size:26px;font-weight:900}
  .sub{color:var(--muted);font-size:14px;margin-top:6px;margin-bottom:24px}
  .tabs{display:flex;background:var(--panel);border-radius:12px;padding:4px;margin-bottom:22px}
  .tabs button{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);
    font-weight:700;border-radius:9px;cursor:pointer;font-size:14px;transition:.2s}
  .tabs button.active{background:linear-gradient(90deg,var(--cyan),var(--violet));color:#04060f}
  label{font-size:13px;color:var(--muted);display:block;margin:14px 0 6px}
  input,select{width:100%;padding:13px 14px;border-radius:11px;border:1px solid var(--line);
    background:rgba(255,255,255,.03);color:var(--txt);font-size:15px;outline:none;transition:.2s}
  input:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(34,227,255,.15)}
  .btn{width:100%;margin-top:22px;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:800;
    cursor:pointer;color:#04060f;background:linear-gradient(90deg,var(--cyan),var(--violet))}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn:hover:not(:disabled){box-shadow:0 0 26px rgba(162,89,255,.55)}
  .msg{margin-top:14px;font-size:13px;text-align:center;min-height:18px}
  .msg.err{color:var(--pink)} .msg.ok{color:var(--green)}
  .hint{margin-top:20px;font-size:12px;color:var(--muted);border:1px dashed var(--line);border-radius:10px;padding:11px 13px}
  .warn{margin-top:16px;font-size:12.5px;color:var(--pink);border:1px solid rgba(255,79,216,.4);border-radius:10px;padding:11px 13px}
  .dash{display:none}
  .role-badge{display:inline-block;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:800;margin-bottom:8px}
  .r70{background:rgba(34,227,255,.15);color:var(--cyan);border:1px solid rgba(34,227,255,.4)}
  .r20{background:rgba(162,89,255,.15);color:var(--violet);border:1px solid rgba(162,89,255,.4)}
  .r10{background:rgba(255,79,216,.15);color:var(--pink);border:1px solid rgba(255,79,216,.4)}
  .stat{display:flex;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line);font-size:14px}
  .stat b{color:var(--green)}
  .logout{margin-top:18px;background:transparent;border:1px solid var(--line);color:var(--txt)}
</style>
</head>
<body>
<div class="box">
  <div id="auth">
    <a class="back" href="index.html">← 回首頁</a>
    <h1><span class="grad">會員入口</span></h1>
    <p class="sub">真實帳號系統 · 由 Supabase 提供安全驗證</p>
    <div class="tabs">
      <button id="tabLogin" class="active" onclick="switchTab('login')">登入</button>
      <button id="tabReg" onclick="switchTab('reg')">註冊</button>
    </div>

    <form id="formLogin" onsubmit="return doLogin(event)">
      <label>Email</label>
      <input type="email" id="li_email" placeholder="you@example.com" required autocomplete="email">
      <label>密碼</label>
      <input type="password" id="li_pw" placeholder="••••••••" required autocomplete="current-password">
      <button class="btn" type="submit" id="li_btn">登入社群</button>
    </form>

    <form id="formReg" style="display:none" onsubmit="return doReg(event)">
      <label>暱稱</label>
      <input type="text" id="rg_name" placeholder="你的暱稱" required>
      <label>Email</label>
      <input type="email" id="rg_email" placeholder="you@example.com" required autocomplete="email">
      <label>密碼(至少 6 碼)</label>
      <input type="password" id="rg_pw" placeholder="••••••••" minlength="6" required autocomplete="new-password">
      <label>身分(角色)</label>
      <select id="rg_role">
        <option value="community">社群擁有者(分潤 70%)</option>
        <option value="operator">經營者(分潤 20%)</option>
        <option value="advisor">顧問(分潤 10%)</option>
      </select>
      <button class="btn" type="submit" id="rg_btn">建立帳號</button>
    </form>

    <div class="msg" id="msg"></div>
    <div class="hint">🔐 真實帳號:註冊後資料存於你的 Supabase 雲端資料庫,並非瀏覽器本機。若開啟 Email 驗證,註冊後請收信點開連結再登入。</div>
    <div class="warn" id="cfgwarn" style="display:none">⚠ 尚未設定 Supabase 連線金鑰(SUPABASE_URL / anon public key)。</div>
  </div>

  <div id="dash" class="dash">
    <a class="back" href="index.html">← 回首頁</a>
    <h1>歡迎,<span class="grad" id="d_name">會員</span></h1>
    <p class="sub" id="d_email"></p>
    <div id="d_badge"></div>
    <div style="margin-top:16px">
      <div class="stat"><span>我的角色</span><b id="d_role"></b></div>
      <div class="stat"><span>分潤權重</span><b id="d_share"></b></div>
      <div class="stat"><span>帳號 ID</span><b id="d_uid" style="font-size:12px"></b></div>
      <div class="stat"><span>註冊日期</span><b id="d_created" style="font-size:12px"></b></div>
    </div>

    <div style="margin-top:20px;border:1px solid var(--line);border-radius:14px;padding:16px">
      <div style="font-weight:800;margin-bottom:4px">申請變更角色</div>
      <div style="font-size:12.5px;color:var(--muted);margin-bottom:10px">送出後需經後台(經營者/管理員)審核才會生效。</div>
      <div id="reqStatus" style="font-size:13px;margin-bottom:10px"></div>
      <div id="reqForm">
        <label style="margin-top:0">想變更為</label>
        <select id="rq_role">
          <option value="community">社群擁有者(70%)</option>
          <option value="operator">經營者(20%)</option>
          <option value="advisor">顧問(10%)</option>
        </select>
        <button class="btn" style="margin-top:14px" id="rq_btn" onclick="requestRole()">送出申請</button>
      </div>
    </div>

    <button class="btn logout" onclick="logout()">登出</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ====== 只需填這兩個「可公開」的值（Supabase → Project Settings → API）======
  const SUPABASE_URL = "https://hodgljypvfofzbhvlmhj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_2FR3r3hrSD1AXHhfM_DmiA_EGGn4d-B";   // publishable key（可公開）
  // =======================================================================

  const roleMap = {
    community:{t:'社群擁有者',s:'70%',c:'r70'},
    operator:{t:'經營者',s:'20%',c:'r20'},
    advisor:{t:'顧問',s:'10%',c:'r10'}
  };
  const configured = !SUPABASE_URL.includes("__") && !SUPABASE_ANON_KEY.includes("__");
  let sb = null;
  if (configured && window.supabase) {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } else {
    document.getElementById('cfgwarn').style.display = 'block';
  }

  function setMsg(t, cls){const m=document.getElementById('msg');m.textContent=t;m.className='msg '+(cls||'');}
  function switchTab(t){
    const isLogin=t==='login';
    tabLogin.classList.toggle('active',isLogin);tabReg.classList.toggle('active',!isLogin);
    formLogin.style.display=isLogin?'block':'none';formReg.style.display=isLogin?'none':'block';
    setMsg('','');
  }

  async function doReg(e){
    e.preventDefault();
    if(!sb){setMsg('尚未設定 Supabase 金鑰','err');return false;}
    rg_btn.disabled=true; setMsg('建立中…','');
    const {data,error} = await sb.auth.signUp({
      email: rg_email.value.trim(),
      password: rg_pw.value,
      options:{ data:{ name: rg_name.value.trim(), role: rg_role.value } }
    });
    rg_btn.disabled=false;
    if(error){setMsg(error.message,'err');return false;}
    if(data.session){ render(); }
    else { setMsg('註冊成功!請到信箱點開驗證連結後再登入。','ok'); switchTab('login'); }
    return false;
  }

  async function doLogin(e){
    e.preventDefault();
    if(!sb){setMsg('尚未設定 Supabase 金鑰','err');return false;}
    li_btn.disabled=true; setMsg('登入中…','');
    const {error} = await sb.auth.signInWithPassword({ email: li_email.value.trim(), password: li_pw.value });
    li_btn.disabled=false;
    if(error){setMsg(error.message,'err');return false;}
    render();
    return false;
  }

  async function logout(){ if(sb) await sb.auth.signOut(); location.reload(); }

  let CURRENT_USER = null, CURRENT_ROLE = 'community';

  async function render(){
    if(!sb) return;
    const {data:{user}} = await sb.auth.getUser();
    if(!user) return;
    CURRENT_USER = user;
    const meta = user.user_metadata || {};
    // 角色以 profiles 為準(審核變更後即生效),讀不到時退回註冊時的 metadata
    let role = meta.role || 'community';
    try{
      const {data:prof} = await sb.from('profiles').select('role,name').eq('id', user.id).single();
      if(prof && prof.role) role = prof.role;
    }catch(e){}
    CURRENT_ROLE = role;
    const r = roleMap[role] || roleMap.community;
    document.getElementById('auth').style.display='none';
    document.getElementById('dash').style.display='block';
    d_name.textContent = meta.name || user.email.split('@')[0];
    d_email.textContent = user.email;
    d_role.textContent = r.t;
    d_share.textContent = r.s;
    d_uid.textContent = user.id;
    d_created.textContent = (user.created_at||'').slice(0,10);
    d_badge.innerHTML = '<span class="role-badge '+r.c+'">'+r.t+' · 分潤 '+r.s+'</span>';
    loadReqStatus();
  }

  async function loadReqStatus(){
    if(!sb || !CURRENT_USER) return;
    const el = document.getElementById('reqStatus');
    const {data} = await sb.from('role_requests').select('requested_role,status,created_at')
      .eq('user_id', CURRENT_USER.id).order('created_at',{ascending:false}).limit(1);
    if(data && data.length){
      const q = data[0];
      const label = (roleMap[q.requested_role]||{t:q.requested_role}).t;
      if(q.status==='pending'){
        el.innerHTML = '⏳ 你有一筆申請(變更為「'+label+'」)<b style="color:var(--cyan)"> 審核中</b>。';
        document.getElementById('reqForm').style.display='none';
        return;
      }
      if(q.status==='approved') el.innerHTML = '✅ 上次申請(「'+label+'」)<b style="color:var(--green)"> 已核准</b>。';
      if(q.status==='rejected') el.innerHTML = '❌ 上次申請(「'+label+'」)<b style="color:var(--pink)"> 已婉拒</b>。';
    } else { el.textContent=''; }
    document.getElementById('reqForm').style.display='block';
  }

  async function requestRole(){
    if(!sb || !CURRENT_USER) return;
    const want = document.getElementById('rq_role').value;
    if(want === CURRENT_ROLE){ setMsgInline('你已經是這個角色了。'); return; }
    rq_btn.disabled = true;
    const {error} = await sb.from('role_requests').insert({
      user_id: CURRENT_USER.id, email: CURRENT_USER.email,
      from_role: CURRENT_ROLE, requested_role: want, status: 'pending'
    });
    rq_btn.disabled = false;
    if(error){ setMsgInline('送出失敗:'+error.message); return; }
    loadReqStatus();
  }
  function setMsgInline(t){ document.getElementById('reqStatus').textContent = t; }

  if(sb) render();
</script>
</body>
</html>
